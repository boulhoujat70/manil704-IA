<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Générateur Images & Vidéos</title>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #111827, #1f2937); color: white; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 900px; background: #0f172a; border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    h1 { text-align: center; margin-bottom: 10px; font-size: 32px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
    .api-status { text-align: center; margin-bottom: 15px; font-size: 14px; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 8px; border-radius: 8px; display: none; }
    textarea, select { width: 100%; padding: 15px; border-radius: 12px; border: none; outline: none; margin-bottom: 15px; font-size: 16px; background: #1e293b; color: white; }
    textarea { min-height: 130px; resize: vertical; }
    .buttons { display: flex; gap: 15px; flex-wrap: wrap; }
    button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .image-btn { background: #2563eb; color: white; }
    .video-btn { background: #9333ea; color: white; }
    button:hover:not(:disabled) { transform: scale(1.02); opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 30px; background: #020617; border-radius: 15px; padding: 20px; min-height: 250px; display: flex; justify-content: center; align-items: center; text-align: center; }
    .result img, .result video { max-width: 100%; border-radius: 15px; }
    .loading { color: #38bdf8; font-size: 18px; }
    .error { color: #f87171; }
    .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
    @media (max-width: 600px) { h1 { font-size: 25px; } .container { padding: 20px; } .buttons { flex-direction: column; } }
  </style>
</head>

<body>
  <div class="container">
    <h1>IA Générateur Images & Vidéos</h1>
    <p class="subtitle">Écris ton idée, choisis le style, puis génère ton contenu.</p>
    
    <div id="api-status" class="api-status">🔑 Session connectée à Runway</div>

    <textarea id="prompt" placeholder="Exemple : un homme d'affaires futuriste dans une ville cyberpunk..."></textarea>

    <select id="style">
      <option value="realistic">Ultra réaliste</option>
      <option value="cinematic">Cinématique</option>
      <option value="anime">Anime</option>
      <option value="3d">Rendu 3D</option>
      <option value="cartoon">Cartoon</option>
      <option value="luxury">Style luxe</option>
    </select>

    <select id="format">
      <option value="vertical">Format vertical 9:16</option>
      <option value="square">Format carré 1:1</option>
      <option value="horizontal">Format horizontal 16:9</option>
    </select>

    <div class="buttons">
      <button class="image-btn" id="btn-image" onclick="generateImage()">Générer une image</button>
      <button class="video-btn" id="btn-video" onclick="generateVideo()">Générer une vidéo</button>
    </div>

    <div class="result" id="result">Ton résultat apparaîtra ici.</div>
    <div class="footer">Site sécurisé — Tunnel CORS activé.</div>
  </div>

  <script>
    const resultDiv = document.getElementById("result");
    const btnImage = document.getElementById("btn-image");
    const btnVideo = document.getElementById("btn-video");
    const statusDiv = document.getElementById("api-status");

    // Invite de connexion
    function getApiKey() {
      let key = sessionStorage.getItem("RUNWAY_API_KEY");
      if (!key) {
        key = prompt("🔑 Connexion : Veuillez coller votre clé API Runway :");
        if (key && key.trim() !== "") {
          sessionStorage.setItem("RUNWAY_API_KEY", key.trim());
        }
      }
      if (key) statusDiv.style.display = "block";
      return key;
    }

    // Chargement de la clé
    getApiKey();

    function getUserData() {
      const promptText = document.getElementById("prompt").value.trim();
      const style = document.getElementById("style").value;
      const format = document.getElementById("format").value;
      const currentKey = sessionStorage.getItem("RUNWAY_API_KEY");

      if (!currentKey) {
        resultDiv.innerHTML = '<p class="error">Erreur : Connexion requise. Actualisez la page pour entrer votre clé.</p>';
        return null;
      }
      if (!promptText) {
        resultDiv.innerHTML = '<p class="error">Écris d’abord une description.</p>';
        return null;
      }
      return { prompt: promptText, style, format, key: currentKey };
    }

    function toggleButtons(disabled) {
      btnImage.disabled = disabled;
      btnVideo.disabled = disabled;
    }

    function getResolution(format) {
      if (format === "vertical") return { width: 768, height: 1344 };
      if (format === "square") return { width: 1024, height: 1024 };
      return { width: 1280, height: 768 };
    }

    async function generateImage() {
      resultDiv.innerHTML = '<p class="error">Runway est un moteur vidéo. Utilisez le bouton violet.</p>';
    }

    async function generateVideo() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">Création de la tâche via la passerelle de contournement...</p>';
      toggleButtons(true);

      const dimensions = getResolution(data.format);
      
      // Utilisation d'un reverse proxy transparent qui ne modifie pas la structure POST
      const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent("https://api.v1.runwayml.com/v1/image_to_video");

      try {
        const response = await fetch(proxyUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${data.key}`,
            "X-Runway-Version": "2024-11-06"
          },
          body: JSON.stringify({
            promptText: `${data.prompt}, style: ${data.style}`,
            width: dimensions.width,
            height: dimensions.height,
            model: "gen3a_turbo"
          })
        });

        if (response.status === 401 || response.status === 403) {
          throw new Error("Clé API invalide ou refusée par Runway. Vérifiez vos crédits.");
        }

        const result = await response.json();

        if (!response.ok || !result.id) {
          throw new Error(result.message || "Erreur lors du traitement par Runway.");
        }

        checkVideoStatus(result.id, data.key);

      } catch (error) {
        resultDiv.innerHTML = `
          <p class="error">
            ⚠️ Échec de génération : ${error.message}<br>
            <small>Si l'erreur persiste, l'API de Runway requiert impérativement un hébergement Vercel (Backend).</small>
          </p>
        `;
        toggleButtons(false);
      }
    }

    async function checkVideoStatus(taskId, key) {
      resultDiv.innerHTML = '<p class="loading">L\'IA Runway génère votre vidéo... (30-60 secondes)</p>';

      const interval = setInterval(async () => {
        try {
          const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(`https://api.v1.runwayml.com/v1/tasks/${taskId}`);
          
          const response = await fetch(proxyUrl, {
            method: "GET",
            headers: {
              "Authorization": `Bearer ${key}`,
              "X-Runway-Version": "2024-11-06"
            }
          });

          const task = await response.json();

          if (task.status === "SUCCEEDED") {
            clearInterval(interval);
            toggleButtons(false);
            
            const videoUrl = task.output[0];
            resultDiv.innerHTML = `
              <div>
                <video src="${videoUrl}" controls autoplay loop></video>
                <br><br>
                <a href="${videoUrl}" download="video.mp4" target="_blank" style="color:#38bdf8; font-weight:bold; text-decoration:none;">💾 Télécharger la vidéo</a>
              </div>
            `;
          } else if (task.status === "FAILED") {
            clearInterval(interval);
            toggleButtons(false);
            resultDiv.innerHTML = `<p class="error">La génération a échoué sur Runway : ${task.error || "Crédits épuisés ou prompt bloqué."}</p>`;
          }

        } catch (error) {
          clearInterval(interval);
          toggleButtons(false);
          resultDiv.innerHTML = `<p class="error">Erreur de suivi : ${error.message}</p>`;
        }
      }, 5000);
    }
  </script>
</body>
</html>
