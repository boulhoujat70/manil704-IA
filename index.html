<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Générateur Images & Vidéos</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    textarea, select {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 16px;
      background: #1e293b;
      color: white;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .image-btn {
      background: #2563eb;
      color: white;
    }

    .video-btn {
      background: #9333ea;
      color: white;
    }

    button:hover {
      transform: scale(1.02);
      opacity: 0.9;
    }

    .result {
      margin-top: 30px;
      background: #020617;
      border-radius: 15px;
      padding: 20px;
      min-height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .result img,
    .result video {
      max-width: 100%;
      border-radius: 15px;
    }

    .loading {
      color: #38bdf8;
      font-size: 18px;
    }

    .error {
      color: #f87171;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 25px;
      }

      .container {
        padding: 20px;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>IA Générateur Images & Vidéos</h1>
    <p class="subtitle">Écris ton idée, choisis le style, puis génère ton contenu.</p>

    <textarea id="prompt" placeholder="Exemple : un homme d'affaires futuriste dans une ville cyberpunk, style cinéma, ultra réaliste..."></textarea>

    <select id="style">
      <option value="realistic">Ultra réaliste</option>
      <option value="cinematic">Cinématique</option>
      <option value="anime">Anime</option>
      <option value="3d">Rendu 3D</option>
      <option value="cartoon">Cartoon</option>
      <option value="luxury">Style luxe</option>
    </select>

    <select id="format">
      <option value="vertical">Format vertical 9:16</option>
      <option value="square">Format carré 1:1</option>
      <option value="horizontal">Format horizontal 16:9</option>
    </select>

    <div class="buttons">
      <button class="image-btn" onclick="generateImage()">Générer une image</button>
      <button class="video-btn" onclick="generateVideo()">Générer une vidéo</button>
    </div>

    <div class="result" id="result">
      Ton résultat apparaîtra ici.
    </div>

    <div class="footer">
      Site IA connecté à un backend sécurisé.
    </div>
  </div>

  <script>
    const resultDiv = document.getElementById("result");

    function getUserData() {
      const prompt = document.getElementById("prompt").value.trim();
      const style = document.getElementById("style").value;
      const format = document.getElementById("format").value;

      if (!prompt) {
        resultDiv.innerHTML = '<p class="error">Écris d’abord une description.</p>';
        return null;
      }

      return { prompt, style, format };
    }

    async function generateImage() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">Génération de l’image en cours...</p>';

      try {
        const response = await fetch("/api/generate-image", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!result.imageUrl) {
          throw new Error("Aucune image reçue.");
        }

        resultDiv.innerHTML = `
          <div>
            <img src="${result.imageUrl}" alt="Image générée par IA">
            <br><br>
            <a href="${result.imageUrl}" download style="color:#38bdf8;">
              Télécharger l’image
            </a>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <p class="error">
            Erreur : impossible de générer l’image.<br>
            Vérifie que ton backend /api/generate-image est bien configuré.
          </p>
        `;
      }
    }

    async function generateVideo() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">Génération de la vidéo en cours...</p>';

      try {
        const response = await fetch("/api/generate-video", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!result.videoUrl) {
          throw new Error("Aucune vidéo reçue.");
        }

        resultDiv.innerHTML = `
          <div>
            <video src="${result.videoUrl}" controls></video>
            <br><br>
            <a href="${result.videoUrl}" download style="color:#38bdf8;">
              Télécharger la vidéo
            </a>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <p class="error">
            Erreur : impossible de générer la vidéo.<br>
            Vérifie que ton backend /api/generate-video est bien configuré.
          </p>
        `;
      }
    }
  </script>
</body>
</html>
