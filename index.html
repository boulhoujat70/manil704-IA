<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Générateur Images & Vidéos</title>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #111827, #1f2937); color: white; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 900px; background: #0f172a; border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    h1 { text-align: center; margin-bottom: 10px; font-size: 32px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
    .api-status { text-align: center; margin-bottom: 15px; font-size: 14px; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 8px; border-radius: 8px; display: none; }
    textarea, select { width: 100%; padding: 15px; border-radius: 12px; border: none; outline: none; margin-bottom: 15px; font-size: 16px; background: #1e293b; color: white; }
    textarea { min-height: 130px; resize: vertical; }
    .buttons { display: flex; gap: 15px; flex-wrap: wrap; }
    button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .image-btn { background: #2563eb; color: white; }
    .video-btn { background: #9333ea; color: white; }
    button:hover:not(:disabled) { transform: scale(1.02); opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 30px; background: #020617; border-radius: 15px; padding: 20px; min-height: 250px; display: flex; justify-content: center; align-items: center; text-align: center; }
    .result img, .result video { max-width: 100%; border-radius: 15px; }
    .loading { color: #38bdf8; font-size: 18px; }
    .error { color: #f87171; }
    .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
    @media (max-width: 600px) { h1 { font-size: 25px; } .container { padding: 20px; } .buttons { flex-direction: column; } }
  </style>
</head>

<body>
  <div class="container">
    <h1>IA Générateur Images & Vidéos</h1>
    <p class="subtitle">Écris ton idée, choisis le style, puis génère ton contenu.</p>
    
    <div id="api-status" class="api-status">🔑 Connecté à la session Fal.ai</div>

    <textarea id="prompt" placeholder="Exemple : un homme d'affaires futuriste dans une ville cyberpunk..."></textarea>

    <select id="style">
      <option value="realistic">Ultra réaliste</option>
      <option value="cinematic">Cinématique</option>
      <option value="anime">Anime</option>
      <option value="3d">Rendu 3D</option>
      <option value="cartoon">Cartoon</option>
      <option value="luxury">Style luxe</option>
    </select>

    <select id="format">
      <option value="vertical">Format vertical 9:16</option>
      <option value="square">Format carré 1:1</option>
      <option value="horizontal">Format horizontal 16:9</option>
    </select>

    <div class="buttons">
      <button class="image-btn" id="btn-image" onclick="generateImage()">Générer une image</button>
      <button class="video-btn" id="btn-video" onclick="generateVideo()">Générer une vidéo</button>
    </div>

    <div class="result" id="result">Ton résultat apparaîtra ici.</div>
    <div class="footer">Site sécurisé — Connecté aux serveurs Fal.ai.</div>
  </div>

  <script>
    const resultDiv = document.getElementById("result");
    const btnImage = document.getElementById("btn-image");
    const btnVideo = document.getElementById("btn-video");
    const statusDiv = document.getElementById("api-status");

    // Demande de connexion par clé Fal.ai
    function getApiKey() {
      let key = sessionStorage.getItem("FAL_API_KEY");
      if (!key) {
        key = prompt("🔑 Connexion : Veuillez coller votre clé API FAL.AI :");
        if (key && key.trim() !== "") {
          sessionStorage.setItem("FAL_API_KEY", key.trim());
        }
      }
      if (key) statusDiv.style.display = "block";
      return key;
    }

    // Lancement de la connexion
    getApiKey();

    function getUserData() {
      const promptText = document.getElementById("prompt").value.trim();
      const style = document.getElementById("style").value;
      const format = document.getElementById("format").value;
      const currentKey = sessionStorage.getItem("FAL_API_KEY");

      if (!currentKey) {
        resultDiv.innerHTML = '<p class="error">Erreur : Clé API manquante. Actualisez pour vous connecter.</p>';
        return null;
      }
      if (!promptText) {
        resultDiv.innerHTML = '<p class="error">Écris d’abord une description.</p>';
        return null;
      }
      return { prompt: promptText, style, format, key: currentKey };
    }

    function toggleButtons(disabled) {
      btnImage.disabled = disabled;
      btnVideo.disabled = disabled;
    }

    function getAspectRadio(format) {
      return format === "vertical" ? "9:16" : format === "square" ? "1:1" : "16:9";
    }

    // 1. BOUTON BLEU : Génération d'image ultra rapide (Modèle Flux Schnell)
    async function generateImage() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">L\'IA génère ton image...</p>';
      toggleButtons(true);

      try {
        const response = await fetch("https://queue.fal.run/fal-ai/flux/schnell", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Key ${data.key}`
          },
          body: JSON.stringify({
            prompt: `${data.prompt}, style: ${data.style}`,
            image_size: data.format === "vertical" ? "portrait_4_5" : data.format === "square" ? "square" : "landscape_16_9",
            sync_mode: true
          })
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || "Erreur lors de la génération.");

        const imageUrl = result.images[0].url;
        resultDiv.innerHTML = `
          <div>
            <img src="${imageUrl}" alt="Image générée">
            <br><br>
            <a href="${imageUrl}" download="image.png" target="_blank" style="color:#38bdf8; font-weight:bold; text-decoration:none;">💾 Télécharger l’image</a>
          </div>`;
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">Erreur : ${error.message}</p>`;
      } finally {
        toggleButtons(false);
      }
    }

    // 2. BOUTON VIOLET : Génération vidéo (Modèle Luma Dream Machine)
    async function generateVideo() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">Démarrage de la vidéo sur Fal.ai...</p>';
      toggleButtons(true);

      try {
        const response = await fetch("https://queue.fal.run/fal-ai/luma-dream-machine", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Key ${data.key}`
          },
          body: JSON.stringify({
            prompt: `${data.prompt}, style: ${data.style}, 8k, cinematic`,
            aspect_ratio: getAspectRadio(data.format)
          })
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || "Vérifiez vos crédits ou votre clé API.");

        checkVideoStatus(result.request_id, data.key);

      } catch (error) {
        resultDiv.innerHTML = `<p class="error">Échec : ${error.message}</p>`;
        toggleButtons(false);
      }
    }

    async function checkVideoStatus(requestId, key) {
      resultDiv.innerHTML = '<p class="loading">L\'IA génère ton clip vidéo... (Environ 30 secondes)</p>';

      const interval = setInterval(async () => {
        try {
          const response = await fetch(`https://queue.fal.run/fal-ai/luma-dream-machine/requests/${requestId}`, {
            method: "GET",
            headers: { "Authorization": `Key ${key}` }
          });

          const task = await response.json();

          if (task.status === "COMPLETED" && task.video) {
            clearInterval(interval);
            toggleButtons(false);
            resultDiv.innerHTML = `
              <div>
                <video src="${task.video.url}" controls autoplay loop></video>
                <br><br>
                <a href="${task.video.url}" download="video.mp4" target="_blank" style="color:#38bdf8; font-weight:bold; text-decoration:none;">💾 Télécharger la vidéo 9:16</a>
              </div>`;
          } else if (task.status === "FAILED") {
            clearInterval(interval);
            toggleButtons(false);
            resultDiv.innerHTML = '<p class="error">La création de la vidéo a échoué.</p>';
          }
        } catch (error) {
          clearInterval(interval);
          toggleButtons(false);
          resultDiv.innerHTML = `<p class="error">Erreur de suivi : ${error.message}</p>`;
        }
      }, 4000);
    }
  </script>
</body>
</html>
