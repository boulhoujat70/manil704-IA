<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Générateur Images & Vidéos</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    textarea, select {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 16px;
      background: #1e293b;
      color: white;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .image-btn {
      background: #2563eb;
      color: white;
    }

    .video-btn {
      background: #9333ea;
      color: white;
    }

    button:hover:not(:disabled) {
      transform: scale(1.02);
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result {
      margin-top: 30px;
      background: #020617;
      border-radius: 15px;
      padding: 20px;
      min-height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .result img,
    .result video {
      max-width: 100%;
      border-radius: 15px;
    }

    .loading {
      color: #38bdf8;
      font-size: 18px;
    }

    .error {
      color: #f87171;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 25px;
      }

      .container {
        padding: 20px;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>IA Générateur Images & Vidéos</h1>
    <p class="subtitle">Écris ton idée, choisis le style, puis génère ton contenu.</p>

    <textarea id="prompt" placeholder="Exemple : un homme d'affaires futuriste dans une ville cyberpunk, style cinéma, ultra réaliste..."></textarea>

    <select id="style">
      <option value="realistic">Ultra réaliste</option>
      <option value="cinematic">Cinématique</option>
      <option value="anime">Anime</option>
      <option value="3d">Rendu 3D</option>
      <option value="cartoon">Cartoon</option>
      <option value="luxury">Style luxe</option>
    </select>

    <select id="format">
      <option value="vertical">Format vertical 9:16</option>
      <option value="square">Format carré 1:1</option>
      <option value="horizontal">Format horizontal 16:9</option>
    </select>

    <div class="buttons">
      <button class="image-btn" id="btn-image" onclick="generateImage()">Générer une image</button>
      <button class="video-btn" id="btn-video" onclick="generateVideo()">Générer une vidéo</button>
    </div>

    <div class="result" id="result">
      Ton résultat apparaîtra ici.
    </div>

    <div class="footer">
      Site IA connecté directement à l'API Runway.
    </div>
  </div>

  <script>
    // 🔑 Ta clé API Runway
    const API_KEY = "key_c250d95a67aabf417d8e1253daaec420b4af48b8882da7b85ef1c956672b7f659066c4157dad8a9218a77344f7d74fa3380f01c3ae65e40b744dd3fac80ccd89"; 

    const resultDiv = document.getElementById("result");
    const btnImage = document.getElementById("btn-image");
    const btnVideo = document.getElementById("btn-video");

    function getUserData() {
      const prompt = document.getElementById("prompt").value.trim();
      const style = document.getElementById("style").value;
      const format = document.getElementById("format").value;

      if (!prompt) {
        resultDiv.innerHTML = '<p class="error">Écris d’abord une description.</p>';
        return null;
      }
      return { prompt, style, format };
    }

    function toggleButtons(disabled) {
      btnImage.disabled = disabled;
      btnVideo.disabled = disabled;
    }

    function getResolution(format) {
      if (format === "vertical") return { width: 768, height: 1344 };
      if (format === "square") return { width: 1024, height: 1024 };
      return { width: 1280, height: 768 };
    }

    async function generateImage() {
      resultDiv.innerHTML = '<p class="error">L\'API Runway intégrée ici cible la génération vidéo. Utilise le bouton violet "Générer une vidéo".</p>';
    }

    async function generateVideo() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">Création de la tâche sur Runway (Direct)...</p>';
      toggleButtons(true);

      const dimensions = getResolution(data.format);

      try {
        // Envoi en ligne directe vers Runway
        const response = await fetch("https://api.v1.runwayml.com/v1/image_to_video", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${API_KEY}`,
            "X-Runway-Version": "2024-11-06"
          },
          body: JSON.stringify({
            promptText: `${data.prompt}, style: ${data.style}`,
            width: dimensions.width,
            height: dimensions.height,
            model: "gen3a_turbo"
          })
        });

        const result = await response.json();

        if (!response.ok || !result.id) {
          throw new Error(result.message || "Impossible d'initier la génération. Vérifie tes crédits Runway.");
        }

        checkVideoStatus(result.id);

      } catch (error) {
        resultDiv.innerHTML = `
          <p class="error">
            Erreur lors de la création : ${error.message}<br><br>
            <small>💡 Si tu as une erreur réseau, assure-toi d'avoir installé et activé l'extension de navigateur <strong>Allow CORS</strong> pour débloquer les requêtes directes.</small>
          </p>
        `;
        toggleButtons(false);
      }
    }

    async function checkVideoStatus(taskId) {
      resultDiv.innerHTML = '<p class="loading">L\'IA Runway génère ton clip... (Patiente environ 30 à 60 secondes)</p>';

      const interval = setInterval(async () => {
        try {
          const response = await fetch(`https://api.v1.runwayml.com/v1/tasks/${taskId}`, {
            method: "GET",
            headers: {
              "Authorization": `Bearer ${API_KEY}`,
              "X-Runway-Version": "2024-11-06"
            }
          });

          const task = await response.json();

          if (task.status === "SUCCEEDED") {
            clearInterval(interval);
            toggleButtons(false);
            
            const videoUrl = task.output[0];

            resultDiv.innerHTML = `
              <div>
                <video src="${videoUrl}" controls autoplay loop></video>
                <br><br>
                <a href="${videoUrl}" download="video-runway.mp4" target="_blank" style="color:#38bdf8; font-weight:bold; text-decoration:none;">
                  💾 Télécharger la vidéo Runway
                </a>
              </div>
            `;
          } else if (task.status === "FAILED") {
            clearInterval(interval);
            toggleButtons(false);
            resultDiv.innerHTML = `<p class="error">La génération Runway a échoué : ${task.error || "Erreur interne de traitement."}</p>`;
          }

        } catch (error) {
          clearInterval(interval);
          toggleButtons(false);
          resultDiv.innerHTML = `<p class="error">Erreur de suivi : ${error.message}</p>`;
        }
      }, 4000);
    }
  </script>
</body>
</html>
