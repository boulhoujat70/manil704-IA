<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Générateur Images & Vidéos</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    textarea, select {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 16px;
      background: #1e293b;
      color: white;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .image-btn {
      background: #2563eb;
      color: white;
    }

    .video-btn {
      background: #9333ea;
      color: white;
    }

    button:hover:not(:disabled) {
      transform: scale(1.02);
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result {
      margin-top: 30px;
      background: #020617;
      border-radius: 15px;
      padding: 20px;
      min-height: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .result img,
    .result video {
      max-width: 100%;
      border-radius: 15px;
    }

    .loading {
      color: #38bdf8;
      font-size: 18px;
    }

    .error {
      color: #f87171;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 25px;
      }

      .container {
        padding: 20px;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>IA Générateur Images & Vidéos</h1>
    <p class="subtitle">Écris ton idée, choisis le style, puis génère ton contenu.</p>

    <textarea id="prompt" placeholder="Exemple : un homme d'affaires futuriste dans une ville cyberpunk, style cinéma, ultra réaliste..."></textarea>

    <select id="style">
      <option value="realistic">Ultra réaliste</option>
      <option value="cinematic">Cinématique</option>
      <option value="anime">Anime</option>
      <option value="3d">Rendu 3D</option>
      <option value="cartoon">Cartoon</option>
      <option value="luxury">Style luxe</option>
    </select>

    <select id="format">
      <option value="vertical">Format vertical 9:16</option>
      <option value="square">Format carré 1:1</option>
      <option value="horizontal">Format horizontal 16:9</option>
    </select>

    <div class="buttons">
      <button class="image-btn" id="btn-image" onclick="generateImage()">Générer une image</button>
      <button class="video-btn" id="btn-video" onclick="generateVideo()">Générer une vidéo</button>
    </div>

    <div class="result" id="result">
      Ton résultat apparaîtra ici.
    </div>

    <div class="footer">
      Site IA connecté à l'écosystème Fal.ai.
    </div>
  </div>

  <script>
    // 🔑 COLLE TA CLÉ API FAL.AI ICI :
    const API_KEY = "TA_CLE_FAL_ICI"; 

    const resultDiv = document.getElementById("result");
    const btnImage = document.getElementById("btn-image");
    const btnVideo = document.getElementById("btn-video");

    function getUserData() {
      const prompt = document.getElementById("prompt").value.trim();
      const style = document.getElementById("style").value;
      const format = document.getElementById("format").value;

      if (!prompt) {
        resultDiv.innerHTML = '<p class="error">Écris d’abord une description.</p>';
        return null;
      }
      if (API_KEY === "TA_CLE_FAL_ICI") {
        resultDiv.innerHTML = '<p class="error">Erreur : Remplace "TA_CLE_FAL_ICI" par ta clé API Fal.ai dans le code.</p>';
        return null;
      }
      return { prompt, style, format };
    }

    function toggleButtons(disabled) {
      btnImage.disabled = disabled;
      btnVideo.disabled = disabled;
    }

    function getAspectRadio(format) {
      if (format === "vertical") return "9:16";
      if (format === "square") return "1:1";
      return "16:9";
    }

    // 1. GENERATION D'IMAGE (Via Flux Schnell - Ultra rapide et qualitatif)
    async function generateImage() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">L\'IA génère ton image (Flux.1)...</p>';
      toggleButtons(true);

      try {
        const response = await fetch("https://queue.fal.run/fal-ai/flux/schnell", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Key ${API_KEY}`
          },
          body: JSON.stringify({
            prompt: `${data.prompt}, style: ${data.style}`,
            image_size: data.format === "vertical" ? "portrait_4_5" : data.format === "square" ? "square" : "landscape_16_9",
            sync_mode: true
          })
        });

        const result = await response.json();
        if (!response.ok || !result.images || result.images.length === 0) {
          throw new Error(result.detail || "Erreur lors de la création de l'image.");
        }

        const imageUrl = result.images[0].url;
        resultDiv.innerHTML = `
          <div>
            <img src="${imageUrl}" alt="Image générée">
            <br><br>
            <a href="${imageUrl}" download="image-ia.png" target="_blank" style="color:#38bdf8; font-weight:bold; text-decoration:none;">
              💾 Télécharger l’image
            </a>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">Erreur Image : ${error.message}</p>`;
      } finally {
        toggleButtons(false);
      }
    }

    // 2. GENERATION DE VIDEO (Via Luma Dream Machine - Idéal pour le 9:16 et cinématique)
    async function generateVideo() {
      const data = getUserData();
      if (!data) return;

      resultDiv.innerHTML = '<p class="loading">Création de la tâche vidéo (Luma Dream Machine)...</p>';
      toggleButtons(true);

      try {
        const response = await fetch("https://queue.fal.run/fal-ai/luma-dream-machine", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Key ${API_KEY}`
          },
          body: JSON.stringify({
            prompt: `${data.prompt}, style: ${data.style}, cinematic look, ultra detailed, 8k`,
            aspect_ratio: getAspectRadio(data.format)
          })
        });

        const result = await response.json();
        if (!response.ok || !result.request_id) {
          throw new Error(result.detail || "Impossible de démarrer la vidéo.");
        }

        checkVideoStatus(result.request_id);

      } catch (error) {
        resultDiv.innerHTML = `<p class="error">Erreur Vidéo : ${error.message}</p>`;
        toggleButtons(false);
      }
    }

    async function checkVideoStatus(requestId) {
      resultDiv.innerHTML = '<p class="loading">L\'IA génère ta scène vidéo... (Environ 30-45 secondes)</p>';

      const interval = setInterval(async () => {
        try {
          const response = await fetch(`https://queue.fal.run/fal-ai/luma-dream-machine/requests/${requestId}`, {
            method: "GET",
            headers: { "Authorization": `Key ${API_KEY}` }
          });

          const statusData = await response.json();

          if (statusData.status === "COMPLETED" && statusData.video) {
            clearInterval(interval);
            toggleButtons(false);

            const videoUrl = statusData.video.url;
            resultDiv.innerHTML = `
              <div>
                <video src="${videoUrl}" controls autoplay loop></video>
                <br><br>
                <a href="${videoUrl}" download="video-ia.mp4" target="_blank" style="color:#38bdf8; font-weight:bold; text-decoration:none;">
                  💾 Télécharger la vidéo 9:16
                </a>
              </div>
            `;
          } else if (statusData.status === "FAILED") {
            clearInterval(interval);
            toggleButtons(false);
            resultDiv.innerHTML = `<p class="error">La génération de la vidéo a échoué.</p>`;
          }
        } catch (error) {
          clearInterval(interval);
          toggleButtons(false);
          resultDiv.innerHTML = `<p class="error">Erreur de suivi : ${error.message}</p>`;
        }
      }, 4000);
    }
  </script>
</body>
</html>
